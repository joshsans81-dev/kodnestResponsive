<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KodNest Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

/* --- BASE/DESKTOP STYLES (Screen widths > 1024px) --- */
body{
    background: #103c52; /* Deep Blue/Teal */
    transition: background 0.5s ease; /* Smooth color transitions */
}

.grid-container{
    display:grid;
    grid-template-columns:55% 45%;
    min-height:100vh;
}

.header{
    grid-column:1/3;
    background:#135267;
    padding:25px;
    display:flex;
    justify-content:center;
    align-items:center;
    transition: background 0.5s ease;
}

.header img {
    max-width: 20%;
    height: auto;
}

.navbar{
    grid-column:1/3;
    background:#d4b100;
    padding:18px;
}

.menu{
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap: wrap;
}

.menu a{
    text-decoration:none;
    color:white;
    font-size:20px;
    font-weight:bold;
    transition:0.3s;
}

.menu a:hover{
    color:#103c52;
}

.content{
    background: transparent; /* Allows body background to show through */
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:80px;
}

.content h1{
    font-size:64px;
    margin-bottom:25px;
}

.content p{
    font-size:25px;
    line-height:1.7;
    margin-bottom:35px;
    max-width:650px;
}

.btn{
    width:220px;
    max-width: 100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#d4b100;
    color:#103c52;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#ffd633;
    transform:translateY(-3px);
}

.image-section{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.image-card{
    background:rgba(255, 255, 255, 0.1);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:30px;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 540px; 
}

.image-card img{
    width:100%;
    height: auto;
    display:block;
    border-radius:15px;
}

.footer{
    grid-column:1/3;
    background:#082a39;
    color:white;
    text-align:center;
    padding:22px;
    font-size:18px;
    transition: background 0.5s ease;
}

/* --- ALTERNATIVE RESOLUTION BREAKPOINTS --- */

/* 1. TABLET/MID-SIZE LAYOUT (769px to 1024px) */
@media(max-width:1024px){
    body {
        background: #2d1b4e; /* Deep Purple Theme */
    }
    .header {
        background: #3d246aa7;
    }
    .footer {
        background: #1a1031;
    }
    .content {
        padding: 40px;
    }
    .content h1 {
        font-size: 48px;
    }
    .content p {
        font-size: 22px;
    }
}

/* 2. SMALL TABLETS & LARGE PHONES (481px to 768px) */
@media(max-width:768px){
    body {
        background: #143d22; /* Forest Green Theme */
    }
    .header {
        background: #1f5c34;
    }
    .footer {
        background: #0b2414;
    }
    .grid-container{
        grid-template-columns:1fr;
    }
    .header, .navbar, .footer{
        grid-column:1;
    }
    .content{
        text-align:center;
        align-items:center;
        padding:50px 20px;
    }
    .content h1{
        font-size:40px;
    }
    .content p{
        font-size:18px;
    }
    .image-section{
        padding:30px 20px;
    }
}

/* 3. SMALL MOBILE PHONES (0px to 480px) */
@media(max-width:480px){
    body {
        background: #4a1525; /* Crimson/Burgundy Theme */
    }
    .header {
        background: #6b2137;
    }
    .footer {
        background: #2b0c16;
    }
    .menu {
        gap: 20px;
    }
    .menu a {
        font-size: 16px;
    }
    .content h1 {
        font-size: 32px;
    }
    .image-card {
        padding: 15px;
    }
}
</style>
</head>

<body>

<div class="grid-container">

    <div class="header">
        <img src="kodnest-logo.png" alt="KodNest Logo">
    </div>

    <div class="navbar">
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Courses</a>
            <a href="#">Placements</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <div class="content">
        <h1>From Learning to Earning</h1>
        <p>
            Join the best software training and placement institute to
            master programming, build real-world projects, and launch
            your tech career with confidence.
        </p>
        <button class="btn">Join Today</button>
    </div>

    <div class="image-section">
        <div class="image-card">
            <img src="login5.png" alt="Illustration">
        </div>
    </div>

    <div class="footer">
        © 2026 KodNest | Learn • Build • Get Placed
    </div>

</div>

</body>
</html>
